<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品編集 — デモ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────────
       Tokens
    ───────────────────────────────────────────── */
    :root {
      --purple:       #852988;
      --purple-h:     #6e2171;
      --purple-light: #f5e8f6;
      --g50:  #f4f5fa;
      --g100: #e3e7f0;
      --g200: #c8ced8;
      --g300: #aab3c4;
      --g400: #8a96a8;
      --g500: #6b7688;
      --g600: #4b566a;
      --g700: #303a4c;
      --g800: #141c25;
      --white: #ffffff;
      --r4: 4px; --r6: 6px; --r8: 8px;
      --shadow: 0 20px 48px rgba(30,20,40,.18);
      --font: 'Noto Sans JP', sans-serif;
    }

    /* ─────────────────────────────────────────────
       Page
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: #141428;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 16px 40px;
    }

    /* ─────────────────────────────────────────────
       Demo switcher
    ───────────────────────────────────────────── */
    .switcher {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 999;
      background: rgba(255,255,255,.08);
      padding: 4px;
      border-radius: 8px;
      backdrop-filter: blur(6px);
    }
    .sw-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font: 600 12px var(--font);
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,.6);
      transition: all .15s;
    }
    .sw-btn.active { background: var(--purple); color: #fff; }

    /* ─────────────────────────────────────────────
       Modal shell
    ───────────────────────────────────────────── */
    .modal {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      width: 860px;
      max-width: calc(100vw - 32px);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────────
       Header
    ───────────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--g100);
      flex-shrink: 0;
    }
    .hdr-label { font-size: 16px; font-weight: 700; color: var(--g800); letter-spacing: .02em; }
    .hdr-actions { display: flex; align-items: center; gap: 10px; }

    /* ─────────────────────────────────────────────
       Buttons
    ───────────────────────────────────────────── */
    .btn-primary {
      height: 36px; padding: 0 20px;
      background: var(--purple); color: #fff;
      border: none; border-radius: var(--r6);
      font: 700 14px var(--font); cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--purple-h); }

    .btn-ghost {
      height: 36px; padding: 0 18px;
      background: transparent; color: var(--g700);
      border: 1.5px solid var(--g200); border-radius: var(--r6);
      font: 500 14px var(--font); cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .btn-ghost:hover { border-color: var(--g400); background: var(--g50); }

    .btn-close {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: var(--r6);
      color: var(--g400); font-size: 16px; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-close:hover { background: var(--g50); color: var(--g800); }

    .btn-dark {
      height: 36px; padding: 0 18px;
      background: var(--g700); color: #fff;
      border: none; border-radius: var(--r6);
      font: 600 13px var(--font); cursor: pointer;
      transition: background .15s;
    }
    .btn-dark:hover { background: var(--g800); }

    .btn-primary-lg {
      height: 36px; padding: 0 20px;
      background: var(--purple); color: #fff;
      border: none; border-radius: var(--r6);
      font: 700 13px var(--font); cursor: pointer;
      transition: background .15s;
    }
    .btn-primary-lg:hover { background: var(--purple-h); }

    /* ─────────────────────────────────────────────
       Body (scrollable)
    ───────────────────────────────────────────── */
    .body {
      display: block;
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }
    .body > * + * { margin-top: 20px; }
    .body::-webkit-scrollbar { width: 5px; }
    .body::-webkit-scrollbar-thumb { background: var(--g200); border-radius: 3px; }

    /* ─────────────────────────────────────────────
       Product info block
    ───────────────────────────────────────────── */
    .product-block {
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    .product-thumb {
      width: 164px;
      align-self: stretch;
      flex-shrink: 0;
      object-fit: cover;
      border-radius: var(--r8);
      border: 1px solid var(--g100);
      display: block;
    }
    .product-thumb-ph {
      width: 164px; align-self: stretch; flex-shrink: 0;
      border-radius: var(--r8); border: 1px solid var(--g200);
      background: var(--g100);
      display: flex; align-items: center; justify-content: center;
      color: var(--g300);
    }
    .product-fields {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ─────────────────────────────────────────────
       Field
    ───────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 12px; font-weight: 700; color: var(--g500); letter-spacing: .03em; }

    /* ─────────────────────────────────────────────
       Inputs
    ───────────────────────────────────────────── */
    input[type="number"],
    input[type="text"],
    textarea {
      font: 14px var(--font);
      color: var(--g800);
      background: var(--white);
      border: 1px solid var(--g200);
      border-radius: var(--r4);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="number"]:focus,
    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,.1);
    }
    input[type="number"] { height: 38px; padding: 0 12px; -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="text"] { height: 38px; padding: 0 12px; }
    textarea { padding: 10px 12px; resize: none; line-height: 1.55; width: 100%; }
    .product-fields textarea { height: 64px; }
    .hdr-actions .btn-ghost,
    .hdr-actions .btn-primary { min-width: 96px; }

    /* read-only text display */
    .val-display {
      height: 38px; padding: 0 12px;
      border: 1px solid var(--g100); border-radius: var(--r4);
      background: var(--g50);
      display: flex; align-items: center;
      font: 600 14px var(--font); color: var(--g800);
    }

    /* price input with $ suffix */
    .price-wrap { position: relative; display: inline-flex; align-items: center; }
    .price-wrap input { padding-right: 22px; width: 100px; }
    .price-suffix {
      position: absolute; right: 8px;
      font: 600 11px var(--font); color: var(--g400);
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────
       Sub-fields row (SKU / 価格 / 数量 inline)
    ───────────────────────────────────────────── */
    .sub-row {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-wrap: nowrap;
      width: 100%;
    }
    .sub-row .field {
      flex: 1;
      min-width: 0;
    }
    .sub-row input[type="number"],
    .sub-row input[type="text"] {
      width: 100%;
    }
    /* price wrap fills its field */
    .sub-row .price-wrap {
      width: 100%;
    }
    .sub-row .price-wrap input {
      width: 100%;
    }
    .qty-input { width: 100% !important; }

    /* ─────────────────────────────────────────────
       Divider
    ───────────────────────────────────────────── */
    .divider { height: 1px; background: var(--g100); }

    /* ─────────────────────────────────────────────
       Section header
    ───────────────────────────────────────────── */
    .section-hdr { display: flex; align-items: center; gap: 8px; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--g800); }
    .count-badge {
      font-size: 12px; color: var(--g400);
      background: var(--g100); border-radius: 100px;
      padding: 2px 9px;
    }

    /* ─────────────────────────────────────────────
       Variation table
    ───────────────────────────────────────────── */
    .table-wrap { border: 1px solid var(--g100); border-radius: var(--r6); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--g50); }
    th {
      font: 700 11px var(--font); color: var(--g400);
      text-align: left; padding: 10px 14px;
      border-bottom: 1px solid var(--g100);
      letter-spacing: .05em; text-transform: uppercase;
      white-space: nowrap;
    }
    .th-var   { width: auto; }
    .th-sku   { width: 130px; }
    .th-price { width: 110px; }
    .th-qty   { width: 84px; }

    tbody tr { transition: background .1s; }
    tbody tr:not(:last-child) { border-bottom: 1px solid var(--g100); }
    tbody tr:hover { background: var(--g50); }
    td { padding: 12px 14px; vertical-align: middle; }

    .axes { display: flex; flex-direction: column; gap: 3px; }
    .axis-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: baseline; }
    .axis-name { font-size: 11px; color: var(--g400); white-space: nowrap; }
    .axis-val  { font-size: 13px; font-weight: 700; color: var(--g800); }

    .expand-btn {
      display: inline-flex; align-items: center; gap: 3px;
      background: none; border: none; padding: 0; margin-top: 3px;
      font: 12px var(--font); color: var(--purple); cursor: pointer;
    }
    .expand-btn:hover { text-decoration: underline; }

    td .price-wrap input { width: 80px; }
    td input.qty-input   { width: 60px; }

    /* ─────────────────────────────────────────────
       Offer box (normal modal)
    ───────────────────────────────────────────── */
    .offer-box {
      border: 1.5px solid var(--g200); border-radius: var(--r6);
      overflow: hidden;
    }
    .offer-toggle {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      cursor: pointer; user-select: none;
    }
    .offer-toggle .field-label { cursor: pointer; font-size: 13px; }
    .toggle-track {
      width: 36px; height: 20px; border-radius: 10px;
      background: var(--g200); position: relative; flex-shrink: 0;
      transition: background .2s; cursor: pointer;
    }
    .toggle-track.on { background: var(--purple); }
    .toggle-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: white; position: absolute; top: 2px; left: 2px;
      box-shadow: 0 1px 3px rgba(0,0,0,.22);
      transition: left .2s;
    }
    .toggle-track.on .toggle-thumb { left: 18px; }
    .offer-fields {
      display: none; flex-direction: column; gap: 14px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--g100);
      background: var(--g50);
    }
    .offer-fields.show { display: flex; }
    .offer-fields .sub-row { flex-wrap: wrap; gap: 12px; }

    /* ─────────────────────────────────────────────
       Footer buttons (normal modal)
    ───────────────────────────────────────────── */
    .footer-row { display: flex; gap: 8px; padding-top: 4px; }

    /* ─────────────────────────────────────────────
       Toast
    ───────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e1b4b; color: white; padding: 9px 20px;
      border-radius: var(--r6); font: 500 13px var(--font);
      z-index: 9999; opacity: 0; transition: opacity .2s; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Switcher -->
<div class="switcher">
  <button class="sw-btn active" id="sw-var" onclick="setMode('var')">バリエーション商品</button>
  <button class="sw-btn"        id="sw-std" onclick="setMode('std')">通常商品</button>
</div>

<!-- ═══════════════════════════════════════
     VARIATION MODAL
═══════════════════════════════════════ -->
<div class="modal" id="modalVar">
  <div class="hdr">
    <span class="hdr-label">商品情報編集</span>
    <div class="hdr-actions">
      <button class="btn-ghost"   onclick="showToast('出品取消しました')">出品取消</button>
      <button class="btn-primary" onclick="showToast('保存しました ✓')">保存</button>
      <button class="btn-close"   onclick="showToast('閉じる')">✕</button>
    </div>
  </div>

  <div class="body">

    <!-- Product block -->
    <div class="product-block">
      <img class="product-thumb"
        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop&auto=format"
        alt="商品画像"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
      <div class="product-thumb-ph" style="display:none;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>

      <div class="product-fields">
        <!-- 商品名 -->
        <div class="field">
          <label class="field-label">商品名</label>
          <textarea rows="3">フラットソールのメンズハイヒールウルザンスニーカー、メンズシューズKATEZA43</textarea>
        </div>
        <!-- SKU / 価格 / 数量 -->
        <div class="sub-row">
          <div class="field">
            <label class="field-label">SKU</label>
            <div class="val-display" style="background:var(--white);">N0017</div>
          </div>
          <div class="field">
            <label class="field-label">価格（一括編集）</label>
            <div class="price-wrap">
              <input type="number" id="bulkPrice" min="0" placeholder="0"
                oninput="applyBulkPrice(this.value)" />
              <span class="price-suffix">$</span>
            </div>
          </div>
          <div class="field">
            <label class="field-label">数量（一括編集）</label>
            <input type="number" class="qty-input" id="bulkQty" min="0" placeholder="0"
              oninput="applyBulkQty(this.value)" />
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Variation table -->
    <div class="section-hdr">
      <span class="section-title">バリエーション編集</span>
      <span class="count-badge" id="varCount">6件</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="th-var">バリエーション</th>
            <th class="th-sku">SKU</th>
            <th class="th-price">価格</th>
            <th class="th-qty">数量</th>
          </tr>
        </thead>
        <tbody id="varBody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════
     NORMAL MODAL
═══════════════════════════════════════ -->
<div class="modal" id="modalStd" style="display:none;">
  <div class="hdr">
    <span class="hdr-label">商品情報編集</span>
    <div class="hdr-actions">
      <button class="btn-ghost"   onclick="showToast('出品取消しました')">出品取消</button>
      <button class="btn-primary" onclick="showToast('保存しました ✓')">保存</button>
      <button class="btn-close"   onclick="showToast('閉じる')">✕</button>
    </div>
  </div>

  <div class="body">

    <!-- Product block -->
    <div class="product-block">
      <img class="product-thumb"
        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop&auto=format"
        alt="商品画像"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
      <div class="product-thumb-ph" style="display:none;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>

      <div class="product-fields">
        <div class="field">
          <label class="field-label">商品名</label>
          <textarea rows="3">New balance FuelCell SuperComp Trainer BM2 MRCXBM2 US9.5</textarea>
        </div>
        <div class="sub-row">
          <div class="field">
            <label class="field-label">SKU</label>
            <input type="text" value="BC0123" style="width:120px;" />
          </div>
          <div class="field">
            <label class="field-label">価格</label>
            <div class="price-wrap">
              <input type="number" value="1000" min="0" />
              <span class="price-suffix">$</span>
            </div>
          </div>
          <div class="field">
            <label class="field-label">数量</label>
            <input type="number" class="qty-input" value="3" min="0" />
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- オファー設定 -->
    <div class="offer-box">
      <div class="offer-toggle" onclick="toggleOffer()">
        <div class="toggle-track" id="offerTrack">
          <div class="toggle-thumb"></div>
        </div>
        <span class="field-label">オファー設定</span>
      </div>
      <div class="offer-fields" id="offerFields">
        <div class="sub-row">
          <div class="field">
            <label class="field-label">最低価格</label>
            <div class="price-wrap">
              <input type="number" value="900" min="0" />
              <span class="price-suffix">$</span>
            </div>
          </div>
          <div class="field">
            <label class="field-label">自動承認価格</label>
            <div class="price-wrap">
              <input type="number" placeholder="" min="0" />
              <span class="price-suffix">$</span>
            </div>
          </div>
        </div>
      </div>
    </div>


  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── Variation data ─────────────────────────────────────────── */
  const rows = [
    { id:'v1', axes:[{n:"US Shoe Size (Men's)",v:'US6.5 / UK6.5 / JP25'},{n:'Features',v:'Natural White'}], price:200, qty:5,  sku:'N0017-6.5-WHT' },
    { id:'v2', axes:[{n:"US Shoe Size (Men's)",v:'US7 / UK7 / JP25.5'}, {n:'Features',v:'Natural White'}], price:200, qty:3,  sku:'N0017-7-WHT'   },
    { id:'v3', axes:[{n:"US Shoe Size (Men's)",v:'US7.5 / UK7.5 / JP26'},{n:'Features',v:'Black'}],        price:210, qty:8,  sku:'N0017-7.5-BLK' },
    { id:'v4', axes:[{n:"US Shoe Size (Men's)",v:'US8 / UK8 / JP26.5'}, {n:'Features',v:'Black'}],         price:210, qty:2,  sku:'N0017-8-BLK'   },
    { id:'v5', axes:[{n:"US Shoe Size (Men's)",v:'US8.5 / UK8.5 / JP27'},{n:'Features',v:'Red'},{n:'Style',v:'High-top'}], price:215, qty:0, sku:'N0017-8.5-RED' },
    { id:'v6', axes:[{n:"US Shoe Size (Men's)",v:'US9 / UK9 / JP27.5'}, {n:'Features',v:'Natural White'}], price:200, qty:10, sku:'N0017-9-WHT'   },
  ];
  const expanded = new Set();

  function renderTable() {
    const tbody = document.getElementById('varBody');
    tbody.innerHTML = '';
    rows.forEach(r => {
      const isExp   = expanded.has(r.id);
      const hasMore = r.axes.length > 2;
      const visible = hasMore && !isExp ? r.axes.slice(0,2) : r.axes;

      const axesHtml = visible.map(a =>
        `<div class="axis-row">
          <span class="axis-name">${esc(a.n)}:</span>
          <span class="axis-val">${esc(a.v)}</span>
        </div>`
      ).join('');

      const expBtn = hasMore
        ? `<button class="expand-btn" onclick="toggleExp('${r.id}')">
             ${isExp ? '▲ 折りたたむ' : `▼ +${r.axes.length-2}件`}
           </button>`
        : '';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="axes">${axesHtml}${expBtn}</div></td>
        <td><input type="text" class="input-sku-cell" value="${esc(r.sku)}"
              oninput="rows.find(x=>x.id==='${r.id}').sku=this.value"
              style="width:110px;height:38px;padding:0 10px;font-size:13px;border:1px solid var(--g200);border-radius:4px;outline:none;" /></td>
        <td>
          <div class="price-wrap">
            <input type="number" min="0" value="${r.price}"
              oninput="rows.find(x=>x.id==='${r.id}').price=+this.value"
              style="width:80px;" />
            <span class="price-suffix">$</span>
          </div>
        </td>
        <td><input type="number" class="qty-input" min="0" value="${r.qty}"
              oninput="rows.find(x=>x.id==='${r.id}').qty=+this.value"
              style="width:60px;" /></td>`;
      tbody.appendChild(tr);
    });
  }

  function toggleExp(id) {
    expanded.has(id) ? expanded.delete(id) : expanded.add(id);
    renderTable();
  }

  /* Bulk apply — live as user types */
  function applyBulkPrice(val) {
    const n = parseFloat(val);
    if (!val || isNaN(n) || n < 0) return;
    rows.forEach(r => r.price = n);
    renderTable();
  }
  function applyBulkQty(val) {
    const n = parseInt(val);
    if (!val || isNaN(n) || n < 0) return;
    rows.forEach(r => r.qty = n);
    renderTable();
  }

  /* ── Offer toggle ───────────────────────────────────────────── */
  let offerOn = false;
  function toggleOffer() {
    offerOn = !offerOn;
    document.getElementById('offerTrack').classList.toggle('on', offerOn);
    document.getElementById('offerFields').classList.toggle('show', offerOn);
  }

  /* ── Mode switch ────────────────────────────────────────────── */
  function setMode(m) {
    document.getElementById('modalVar').style.display = m==='var' ? '' : 'none';
    document.getElementById('modalStd').style.display = m==='std' ? '' : 'none';
    document.getElementById('sw-var').classList.toggle('active', m==='var');
    document.getElementById('sw-std').classList.toggle('active', m==='std');
  }

  /* ── Toast ──────────────────────────────────────────────────── */
  let tt;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(tt);
    tt = setTimeout(() => el.classList.remove('show'), 2200);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Input focus style for table cells ─────────────────────── */
  document.addEventListener('focusin', e => {
    if (e.target.classList.contains('input-sku-cell'))
      e.target.style.borderColor = 'var(--purple)';
  });
  document.addEventListener('focusout', e => {
    if (e.target.classList.contains('input-sku-cell'))
      e.target.style.borderColor = 'var(--g200)';
  });

  renderTable();
</script>
</body>
</html>
